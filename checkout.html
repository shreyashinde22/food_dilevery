<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CafeExpress - Checkout</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top text-center">
    <div class="container">
      <a class="navbar-brand hone" href="index.html" style="color:#f57912; font-size: 1.8rem;"><i class="bi bi-cup-hot-fill mr-2"></i>CafeExpress</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav align-items-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html#contact-section">Contact</a></li>
          <li class="nav-item ml-3 active">
            <a href="checkout.html" class="btn button-one">
              <i class="bi bi-cart3"></i> Cart <span class="badge badge-light text-dark ml-1">2</span>
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Checkout Section -->
  <div class="container" style="margin-top: 100px; margin-bottom: 80px;">
    <div class="text-center mb-5">
      <h2 class="hone">Your Order</h2>
      <p class="paragraph">Review your items and complete checkout.</p>
    </div>

    <div class="row">
      <!-- Order Summary (Mockup) -->
      <div class="col-md-7 mb-4">
        <div class="card shadow-sm border-0">
          <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
            <h4 class="font-weight-bold text-secondary">Order Summary</h4>
          </div>
          <div class="card-body">
            <!-- Mock Item 1 -->
            <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-3">
              <div class="d-flex align-items-center">
                <img src="https://images.unsplash.com/photo-1541167760496-1628856ab772?auto=format&fit=crop&q=80&w=100" class="rounded mr-3" alt="Coffee" style="width: 60px; height: 60px; object-fit: cover;">
                <div>
                  <h6 class="mb-0 font-weight-bold">Classic Espresso</h6>
                  <small class="text-muted">Quantity: 2</small>
                </div>
              </div>
              <span class="font-weight-bold">₹240</span>
            </div>

            <!-- Mock Item 2 -->
            <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-3">
              <div class="d-flex align-items-center">
                <img src="https://images.unsplash.com/photo-1555507036-ab1f40ce88cb?auto=format&fit=crop&q=80&w=100" class="rounded mr-3" alt="Croissant" style="width: 60px; height: 60px; object-fit: cover;">
                <div>
                  <h6 class="mb-0 font-weight-bold">Butter Croissant</h6>
                  <small class="text-muted">Quantity: 1</small>
                </div>
              </div>
              <span class="font-weight-bold">₹90</span>
            </div>

            <!-- Totals -->
            <div class="d-flex justify-content-between align-items-center pt-2">
              <span class="text-muted">Subtotal</span>
              <span>₹330</span>
            </div>
            <div class="d-flex justify-content-between align-items-center pt-2">
              <span class="text-muted">Taxes & Fees</span>
              <span>₹20</span>
            </div>
            <hr>
            <div class="d-flex justify-content-between align-items-center">
              <h5 class="font-weight-bold mb-0">Total</h5>
              <h4 class="text-orange font-weight-bold mb-0">₹350</h4>
            </div>
          </div>
        </div>
        
        <div class="mt-4">
          <a href="menu.html" class="text-secondary"><i class="bi bi-arrow-left"></i> Back to Menu</a>
        </div>
      </div>

      <!-- Checkout Form -->
      <div class="col-md-5">
        <div class="card shadow-sm border-0 bg-white">
          <div class="card-body p-4">
            <h4 class="font-weight-bold text-secondary mb-4">Pickup Details</h4>
            
            <form action="success.html">
              <div class="form-group">
                <label for="name" class="font-weight-bold text-muted small">Full Name</label>
                <input type="text" class="form-control" id="name" placeholder="John Doe" required>
              </div>
              <div class="form-group">
                <label for="phone" class="font-weight-bold text-muted small">Phone Number</label>
                <input type="tel" class="form-control" id="phone" placeholder="+91 XXXXX XXXXX" required>
              </div>
              <div class="form-group">
                <label for="instructions" class="font-weight-bold text-muted small">Special Instructions</label>
                <textarea class="form-control" id="instructions" rows="2" placeholder="e.g., extra sugar, warm pastry..."></textarea>
              </div>
              
              <hr class="my-4">
              
              <button type="submit" class="btn button-one btn-lg btn-block shadow-sm">
                Confirm & Place Order <i class="bi bi-check2-circle ml-1"></i>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
